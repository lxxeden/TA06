<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SunSafe Access</title>

<style>

body{
font-family: Arial;
background:#fffdf7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#d97706;
}

.error{
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h1>SunSafe</h1>

<p>Enter password to access the dashboard</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

<input type="password" name="password" placeholder="Password">

<button type="submit">Enter</button>

</form>

</div>

</body>
</html>
